<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="AgeCalc.css" />
</head>

<body>
  <div class="zigzag-1"></div>
  <div class="zigzag-2"></div>
  <div class="zigzag-3"></div>
  <div class="left-dots"></div>
  <div class="app">
    <div class="card">

      <form id="form" novalidate>
        <div class="input-group">

          <div class="field">
            <label>DAY</label>
            <input type="number" id="day" placeholder="DD">
            <small class ="error"></small>
          </div>

          <div class="field">
            <label>MONTH</label>
            <input type="number" id="month" placeholder="MM">
            <small></small>
          </div>

          <div class="field">
            <label>YEAR</label>
            <input type="number" id="year" placeholder="YYYY">
            <small></small>
          </div>

        </div>

        <div class="divider">
          <button class="btn" type="submit">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
              <path d="M12 5V19M12 19L6 13M12 19L18 13" 
                    stroke="white" 
                    stroke-width="3.5" 
                    stroke-linecap="round" 
                    stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

      <div class="output">
        <h1><span id="years">--</span> years</h1>
        <h1><span id="months">--</span> months</h1>
        <h1><span id="days">--</span> days</h1>
      </div>

    </div>
  </div>

  <script src="AgeCalc.js"></script>
</body>

</html>
